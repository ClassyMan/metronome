[package]
name = "metronome"
version = "0.1.0"
authors = ["Adrien Plazas <kekun.plazas@laposte.net>"]
edition = "2021"

[dependencies]
log = "0.4"
pretty_env_logger = "0.4"
gettext-rs = { version = "0.7", features = ["gettext-system"] }
gtk-macros = "0.3"
once_cell = "1.5"
gtk = { version = "0.4", package = "gtk4" }
adw = { version = "0.1", package = "libadwaita" }
gst = { version = "0.16.1", package = "gstreamer" }
gst_player = { version = "0.16.0", package = "gstreamer-player" }
